trigger:
  branches:
    include:
      - dev

pool:
  name: 'Astro'

variables:
  nodeVersion: '24.x'
  deployPath: '/var/www/inwolag_live'
  serviceName: 'inwolag_live'

stages:
- stage: BuildFrontend 
  displayName: 'Build Frontend'
  jobs:
  - job: BuildFrontendJob
    displayName: 'Build Next.js Frontend'
    steps:
    - checkout: self
      displayName: 'Checkout Code'
    
    - task: NodeTool@0
      inputs:
        versionSpec: '$(nodeVersion)'
      displayName: 'Install Node.js'
    
    - script: |
        echo "Installing frontend dependencies"
        npm install --legacy-peer-deps
      displayName: 'Install Frontend Dependencies'
    
    - script: |
        echo "Generating Prisma client..."
        npx prisma generate
      displayName: 'Run Prisma Generate'
    
    - script: |
        echo "Building frontend application"
        npm run build
      displayName: 'Build Frontend Application'
    
    - task: ArchiveFiles@2
      inputs:
        rootFolderOrFile: '$(System.DefaultWorkingDirectory)'
        includeRootFolder: false
        archiveType: 'tar'
        tarCompression: 'gz'
        archiveFile: '$(Build.ArtifactStagingDirectory)/inwolag_live.tar.gz'
        replaceExistingArchive: true
      displayName: 'Archive Frontend Files'
    
    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/inwolag_live.tar.gz'
        ArtifactName: 'frontend'
        publishLocation: 'Container'
      displayName: 'Publish Frontend Artifact'

- stage: PreDeploy
  displayName: 'Pre-Deployment Checks'
  dependsOn: 
    - BuildFrontend
  jobs:
  - job: PreDeployChecks
    displayName: 'Run Pre-Deployment Checks'
    steps:
    - script: |
        echo "Running pre-deployment checks..."
        echo "All build stages completed successfully"
        echo "Ready for deployment"
      displayName: 'Pre-Deployment Validation'

- stage: Deploy
  displayName: 'Deploy to Production'
  dependsOn: PreDeploy
  condition: succeeded('PreDeploy')
  jobs:
  - job: DeployFrontend
    displayName: 'Deploy Frontend'
    steps:
    - task: DownloadBuildArtifacts@1
      inputs:
        buildType: 'current'
        downloadType: 'single'
        artifactName: 'frontend'
        downloadPath: '$(System.ArtifactsDirectory)'

    - script: |
        echo "$(SUDO_PASSWORD)" | sudo -S mkdir -p $(deployPath)
        echo "$(SUDO_PASSWORD)" | sudo -S chown -R $(whoami):$(whoami) $(deployPath)
        echo "Created deployment directory"
      displayName: 'Create Deployment Directory'

    - script: |
        echo "Stopping $(serviceName) service..."
        echo "$(SUDO_PASSWORD)" | sudo -S systemctl stop $(serviceName).service || true
        echo "Service stopped"
      displayName: 'Stop Systemd Service'

    - script: |
        echo "Extracting frontend build..."
        tar -xzf $(System.ArtifactsDirectory)/frontend/inwolag_live.tar.gz -C $(deployPath)/
        chmod -R 755 $(deployPath)/
        echo "Frontend extracted to $(deployPath)"
      displayName: 'Extract Frontend Build'

    - script: |
        cd $(deployPath)/
        if [ -f "package-lock.json" ]; then
          npm ci --omit=dev
          echo "Dependencies installed via npm ci"
        else
          npm install --omit=dev
          echo "Dependencies installed via npm install"
        fi

        # Ensure Prisma client is generated
        npx prisma generate
      displayName: 'Install Dependencies & Generate Prisma'

    - script: |
        echo "Starting $(serviceName) service..."
        echo "$(SUDO_PASSWORD)" | sudo -S systemctl daemon-reload
        echo "$(SUDO_PASSWORD)" | sudo -S systemctl restart $(serviceName).service
        echo "$(SUDO_PASSWORD)" | sudo -S systemctl status $(serviceName).service --no-pager
        echo "Service restarted successfully"
      displayName: 'Restart Systemd Service'
